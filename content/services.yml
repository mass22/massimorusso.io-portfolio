description: Développeur Vue.js senior depuis 2011, j'interviens en construction, en architecture et en décision technique — selon les besoins de l'équipe et du projet.
faq:
  title: Questions fréquentes
  description: Réponses aux questions les plus courantes concernant mon accompagnement.
  categories:
    - title: Missions & collaboration
      questions:
        - label: Travaillez-vous comme développeur ou comme consultant ?
          content: |
            Les deux. Je construis des applications Vue.js et Nuxt en intégrant une équipe, et j'apporte une vision architecturale sur les décisions structurantes. Ce n'est pas l'un ou l'autre — c'est ce qui me différencie.
        - label: Travaillez-vous uniquement sur Vue.js et Nuxt ?
          content: |
            Oui. C'est mon écosystème depuis 2011. Je préfère être excellent dans un domaine que moyen sur plusieurs.
        - label: Quel est votre rythme de travail ?
          content: |
            4 jours par semaine, principalement à distance depuis la Belgique. Des déplacements ponctuels sont possibles selon le contexte.
    - title: IA & modernisation
      questions:
        - label: Proposez-vous des solutions IA clé en main ?
          content: |
            Non. J'intègre l'IA uniquement si c'est pertinent. Mon rôle est d'aider à décider si l'IA apporte une vraie valeur, où, et comment l'intégrer sans créer de dépendance inutile.
        - label: Travaillez-vous avec des équipes non expertes en IA ?
          content: |
            Oui. L'essentiel n'est pas le niveau initial, mais la capacité à prendre des décisions éclairées. J'adapte mon approche au contexte et à la maturité de l'équipe.
