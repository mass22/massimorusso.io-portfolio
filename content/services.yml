process:
  title: Mon cadre d'intervention
  description: "Que j'intervienne en construction ou en architecture, mon approche reste la même : comprendre d'abord, construire ensuite, documenter toujours."
  steps:
    - title: Cadrage & contexte
      description: Compréhension du projet, de la stack existante, des contraintes (legacy, équipe, délais) et des objectifs. On aligne les attentes avant d'écrire la première ligne.
    - title: Construction ou analyse
      description: "Selon le besoin : intégration dans l'équipe pour construire des fonctionnalités, ou audit ciblé pour cartographier les risques et identifier les options réalistes."
    - title: Décisions documentées
      description: Chaque choix structurant est explicité, arbitré et documenté. Pas pour faire joli — pour que l'équipe puisse l'assumer dans le temps sans dépendre de moi.
    - title: Autonomie & suivi
      description: Mon objectif est de rendre l'équipe autonome, pas de créer une dépendance. Sessions de suivi, revues de code ou d'architecture selon le contexte.
