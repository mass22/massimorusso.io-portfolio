title: Services
content: |
  ## Comment j'interviens

  ### Développement Vue.js / Nuxt
  J'intègre une équipe existante pour construire des fonctionnalités, des modules ou des applications complètes en Vue.js et Nuxt. Je travaille en 4 jours par semaine, à distance, sur de la construction — pas de la maintenance pure.

  ### Architecture frontend
  J'aide à évaluer une architecture existante, identifier les points de fragilité et définir une trajectoire de modernisation réaliste. L'objectif n'est pas la réécriture parfaite, mais une architecture compréhensible, maintenable et alignée avec les capacités de l'équipe.

  ### Conseil & aide à la décision
  J'interviens lorsque plusieurs options techniques sont possibles mais qu'aucune décision claire n'émerge. J'aide à structurer les critères, expliciter les arbitrages et documenter les décisions pour qu'elles soient comprises et assumées dans le temps.

  ### IA pragmatique
  J'accompagne les équipes lorsque l'IA entre dans la discussion. Mon rôle : identifier les cas d'usage pertinents, cadrer les risques et intégrer progressivement sans fragiliser l'architecture existante.

  ## Quand faire appel à moi

  - Vous construisez une application Vue.js ou Nuxt et avez besoin d'un dev senior qui pense long terme
  - Votre architecture frontend devient difficile à faire évoluer
  - Une modernisation est envisagée sans trajectoire claire
  - Des choix techniques doivent être arbitrés rapidement
  - L'IA entre dans la roadmap sans cadrage précis

  ## Ce que je ne fais pas

  - Bugfix pur ou maintenance sans construction associée
  - Migration sans vision architecturale claire
  - Gestion de projet ou delivery opérationnel
  - Intégration d'IA clé en main sans réflexion préalable

  ## Ce que vous obtenez

  - Un frontend construit pour durer, pas juste pour livrer
  - Des décisions techniques clarifiées et documentées
  - Une architecture compréhensible par toute l'équipe
  - Une réduction de l'incertitude et de la dette décisionnelle
