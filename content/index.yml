title: Développeur Vue.js senior. Je construis et je structure.
about:
  title: À propos
  description: |
    Développeur frontend depuis 2011, je travaille exclusivement sur Vue.js et Nuxt depuis leurs premières versions.

    Avec le temps, j’ai compris que les projets qui échouent ne manquent pas de bons développeurs.

    Ils manquent de décisions claires, assumées et comprises par toute l’équipe.

    Je construis et je structure — les deux à la fois.
