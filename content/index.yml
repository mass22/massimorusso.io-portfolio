title: Développeur Vue.js senior. Je construis et je structure.
about:
  title: À propos
  description: |
    Développeur frontend depuis 2011, je travaille exclusivement sur Vue.js et Nuxt depuis leurs premières versions.

    Avec le temps, j’ai compris que les projets qui échouent ne manquent pas de bons développeurs.

    Ils manquent de décisions claires, assumées et comprises par toute l’équipe.

    Je construis et je structure — les deux à la fois.
blog:
  title: Notes & analyses
  description: Analyses courtes et retours terrain sur l’architecture frontend, la modernisation de stacks et l’usage pragmatique de l’IA. Du concret, orienté décision.
companies:
  title: Environnements & organisations
  description: J'interviens auprès d'équipes et d'organisations confrontées à des enjeux de complexité, de legacy et de décisions techniques structurantes. Notamment lorsque l'IA entre dans la roadmap.
  patterns:
    - title: Sortir d’une impasse architecturale
      description: Lorsque plusieurs options existent mais qu’aucune décision claire n’émerge, j’aide les équipes à structurer les critères et à arbitrer.
    - title: Clarifier une modernisation frontend
      description: Définir une trajectoire réaliste de modernisation sans réécriture complète, en tenant compte du legacy et des équipes en place.
    - title: Challenger des choix déjà engagés
      description: Apporter un regard externe pour valider, ajuster ou corriger des décisions prises trop rapidement.
    - title: Décider quand (et quand ne pas) utiliser l’IA
      description: Aider les équipes à distinguer les vrais cas d’usage IA des effets de mode, et à décider en amont avant d’investir du temps et de la complexité.
