seo:
  title: Développeur Vue.js senior — Construction & architecture frontend
  description: Massimo Russo est consultant senior en architecture frontend et usage pragmatique de l’IA. Il aide les entreprises à décider quand et comment utiliser l’IA face au legacy, à la complexité et à la hype.
services:
  title: Services
  description: Développeur Vue.js senior depuis 2011, j’interviens en construction, en architecture et en décision technique — selon les besoins de l’équipe et du projet.
  items:
    - title: Développement Vue.js / Nuxt
      slug: developpement-vuejs
      icon: i-ph-code
      description: |
        J’intègre des équipes pour construire des applications Vue.js et Nuxt robustes, performantes et maintenables.

        Je travaille sur de la construction, pas du bugfix ou de la migration.
      bullets:
        - Développement Vue.js / Nuxt
        - Intégration design system
        - Performance frontend
        - Code review & bonnes pratiques
    - title: Architecture frontend
      slug: architecture-frontend
      icon: i-ph-lightbulb
      description: |
        J’aide les équipes à structurer et faire évoluer leur frontend en contexte complexe.

        Analyse de stack, définition d’une architecture cible, stratégies de modernisation progressives et arbitrage des choix structurants.
      bullets:
        - Audit de stack frontend
        - Architecture Vue / Nuxt
        - Stratégies de modernisation
        - Performance & scalabilité
    - title: Conseil & aide à la décision
      slug: aide-decision-technique
      icon: i-ph-chalkboard-teacher
      description: |
        Fort de 14 ans sur des projets frontend complexes, j’apporte un regard expérimenté pour aider à clarifier et structurer les décisions techniques à fort impact.

        Mon rôle est de réduire l’incertitude, pas d’en ajouter.
      bullets:
        - Revue d’architecture
        - Arbitrage technologique
        - Support Tech Leads
        - Vision long terme
    - title: Usage pragmatique de l’IA
      slug: ia-pragmatique
      icon: i-ph-sparkle
      description: |
        J’accompagne les équipes qui veulent intégrer l’IA sans se perdre dans la hype.

        La question n’est plus "est-ce possible ?" mais "est-ce pertinent, et à quel coût ?".
      bullets:
        - Identification des vrais cas d’usage
        - Orchestration IA
        - Intégration produit
        - Cadrage des risques & impacts
