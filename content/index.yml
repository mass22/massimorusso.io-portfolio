testimonials:
  - quote: I have worked with Massimo at VACV and found him to be knowledgeable and dedicated, particularly with Vue.js. He is always keen to stay updated and improve his skills. Massimo has a knack for leaving things better than he found them, which is a great asset in any team.
    author:
      name: Martin Kilmartin
    authorName: "Martin Kilmartin "
    authorDescription: Results-driven Senior Full-Stack Software Engineer
  - quote: I add the chance to work with Massimo at FTQ Fonds de Solidarité. He is highly skilled and very pleasant to work with. I would definitely recommend him.
    author:
      name: Georges De La Jungle
      description: Tech Lead @ Jungle Corp
    authorName: "Achille Kamgang "
    authorDescription: Software Architect / Senior Expert Advisor
  - quote: J'ai eu le plaisir de travailler avec Massimo chez Logient, où il a démontré une expertise exceptionnelle en Vue.js.  Il a joué un rôle clé dans plusieurs projets complexes, proposant des solutions innovantes et écrivant du code propre et efficace.  En plus de ses compétences techniques, Massimo est un excellent communicateur et un formidable coéquipier, apportant toujours une attitude positive et une grande passion pour le développement.  Je recommande vivement Massimo pour toute opportunité nécessitant une expertise en Vue.js.
    author:
