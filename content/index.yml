      Massimo a transformé notre approche de l'architecture frontend. En quelques semaines, il nous a aidés à clarifier des décisions qui traînaient depuis des mois. Sa capacité à structurer le débat sans imposer sa vision est remarquable.
    author:
      name: Felipe Massa
      description: CTO @ StartupXYZ
      linkedin: https://linkedin.com/in/example
  - quote: |
      Un accompagnement pragmatique et concret. Massimo ne se perd pas dans des concepts abstraits — il propose des options, des arbitrages clairs et un plan actionnable. Exactement ce dont notre équipe avait besoin pour sortir du legacy.
    author:
      name: Georges De La Jungle
      description: Tech Lead @ Jungle Corp
  - quote: |
      Travailler avec Massimo sur notre migration Vue/Nuxt a été décisif. Il a su équilibrer la vélocité short-term et la vision long terme. Notre codebase est aujourd'hui plus maintenable et les décisions sont documentées.
    author:
