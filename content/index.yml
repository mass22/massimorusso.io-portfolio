faq:
  title: Questions fréquentes
  description: Réponses aux questions les plus courantes sur mon rôle, mon positionnement et la manière dont j’interviens.
  categories:
    - title: Architecture & Décision technique
      questions:
        - label: Quelle différence entre un dev senior et quelqu’un qui travaille sur l’architecture ?
          content: |
            Un dev senior exécute et livre. Quelqu’un avec une vision architecturale construit en pensant à ce que ça coûtera à maintenir dans 2 ans.

            Je fais les deux — c’est ce qui me différencie.
        - label: Travaillez-vous uniquement sur des projets Vue.js et Nuxt ?
          content: |
            Oui. Vue.js et Nuxt sont mon domaine d’expertise depuis 2011.

            Je préfère être excellent dans un écosystème que moyen sur plusieurs.
        - label: Sur quel type de mission intervenez-vous ?
          content: |
            Construction de fonctionnalités, structuration d’architecture, revue technique ou aide à la décision.

            Je ne fais pas de bugfix pur ni de migration sans construction associée.
    - title: Collaboration & format
      questions:
        - label: Comment se passe concrètement une mission ?
          content: |
            J’intègre l’équipe existante, je comprends le contexte et les contraintes, puis je construis et structure en parallèle.

            Je travaille en 4 jours par semaine.
        - label: Travaillez-vous à distance ou sur site ?
          content: |
            Principalement à distance depuis la Belgique.

            Des déplacements ponctuels sont possibles selon le contexte.
    - title: IA & modernisation
      questions:
        - label: Comment utilisez-vous l’IA dans votre travail ?
          content: |
            Comme un outil, pas comme un oracle. J’utilise l’IA pour explorer des options, accélérer certaines tâches et challenger mes décisions.

            Pas pour remplacer le jugement technique.
        - label: Pouvez-vous aider à intégrer l’IA dans un produit existant ?
          content: |
            Oui, si ça a du sens. Mon approche : identifier les vrais problèmes d’abord, évaluer si l’IA apporte une valeur mesurable, puis intégrer progressivement sans fragiliser l’architecture existante.
