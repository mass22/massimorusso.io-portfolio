        - Architecture review
        - Technology arbitration
        - Tech Lead support
        - Long-term vision

    - title: Pragmatic AI usage
      slug: pragmatic-ai
      icon: i-ph-sparkle
      description: |
        I help teams integrate AI without getting lost in the hype.

        The question is no longer "is it possible?" but "is it relevant, and at what cost?".
