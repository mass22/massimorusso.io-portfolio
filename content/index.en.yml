faq:
  title: Frequently Asked Questions
  description: Answers to the most common questions about my role, my positioning, and how I work.
  categories:
    - title: Architecture & Technical decisions
      questions:
        - label: What's the difference between a senior developer and someone who works on architecture?
          content: |
            A senior dev executes and ships. Someone with an architectural mindset builds while thinking about what it will cost to maintain in 2 years.

            I do both — that's what sets me apart.
        - label: Do you only work on Vue.js and Nuxt projects?
          content: |
            Yes. Vue.js and Nuxt have been my core expertise since 2011.

            I'd rather be excellent in one ecosystem than average across several.
        - label: What type of engagement do you take on?
          content: |
            Feature building, architecture structuring, technical review or decision support.

            I don't do pure bugfix work or migration without associated construction.
    - title: Collaboration & format
      questions:
        - label: What does an engagement look like in practice?
          content: |
            I join the existing team, understand the context and constraints, then build and structure in parallel.

            I work 4 days a week.
        - label: Do you work remotely or on-site?
          content: |
            Primarily remote from Belgium.

            Occasional on-site visits are possible depending on the context.
    - title: AI & modernization
      questions:
        - label: How do you use AI in your work?
          content: |
            As a tool, not an oracle. I use AI to explore options, speed up certain tasks and challenge my decisions.

            Not to replace technical judgment.
        - label: Can you help integrate AI into an existing product?
          content: |
            Yes, if it makes sense. My approach: identify real problems first, assess whether AI brings measurable value, then integrate progressively without weakening the existing architecture.
