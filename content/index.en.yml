    - title: Frontend architecture
      slug: frontend-architecture
      icon: i-ph-lightbulb
      description: |
        I help teams structure and evolve their frontend in complex contexts.

        Stack analysis, architecture target definition, progressive modernization strategies and long-term trade-off arbitration.
