about:
  title: "About"
  description: |
    I've been building frontend products since 2011, exclusively with Vue.js and Nuxt since their early days.

    Over time, I realized that failing projects rarely lack good developers.

    They lack clear decisions, owned by the team and built to last.

    I build and I structure — both at once.
services:
  title: Services
  description: "Senior Vue.js developer since 2011, I work on building, architecture and technical decisions — depending on what the team and project need."
  items:
    - title: Vue.js / Nuxt Development
      slug: vuejs-development
      icon: i-ph-code
      description: |
        I join teams to build robust, performant and maintainable Vue.js and Nuxt applications.

        I focus on building, not fixing or migrating.
      bullets:
        - Vue.js / Nuxt development
        - Design system integration
        - Frontend performance
