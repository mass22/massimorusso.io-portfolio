icon: 'i-ph-chalkboard-teacher'

content: |
  Some technical decisions can't be made on instinct or weak consensus. After 14 years on complex Vue.js projects, I've learned that real blockers are rarely technical — they're decisional. My role isn't to decide for you. It's to help build a clear, understandable decision framework that your team can own over time.

  ---

  ## When to Intervene

  - several technical options appear valid
  - discussions go in circles without convergence
  - decisions are postponed due to lack of clarity
  - long-term consequences are difficult to assess

  ---

  ## What I Do

  - frame real constraints and challenges (product, team, technical)
  - clarify decision criteria and success signals
  - analyze trade-offs, risks, and long-term implications
  - formalize decisions in a documented and shareable way

  ---

  ## What I Don't Do

  - decide arbitrarily
  - rubber-stamp decisions already made
  - provide simplistic answers to complex problems

  ---

  ## What You Get

  - a technical decision clearly understood and consciously owned
  - an aligned team
  - reduced decision debt
  - a solid foundation to move forward with confidence

  ---

  ## For Whom

  - CTOs and Tech Leads facing structuring architecture or stack choices
  - Vue.js teams whose technical discussions go in circles without convergence
  - High-stakes projects where a wrong decision is costly to correct
  - Organizations that want to document and own their decisions, not just make them

