process:
  title: My engagement framework
  description: "Whether I'm building or architecting, my approach stays the same : understand first, build next, always document."
  steps:
    - title: Scoping & context
      description: "Understanding the project, the existing stack, the constraints (legacy, team, deadlines) and the objectives. We align expectations before writing the first line."
    - title: Construction or analysis
      description: "Depending on the need : joining the team to build features, or a targeted audit to map risks and identify realistic options."
    - title: Documented decisions
      description: "Every structuring choice is clarified, arbitrated and documented. Not for show — so the team can own it over time without depending on me."
    - title: Autonomy & follow-up
      description: "My goal is to make the team autonomous, not to create dependency. Follow-up sessions, code or architecture reviews depending on the context."
content: |
  ## How I Intervene

  ### Vue.js / Nuxt Development
  I join an existing team to build features, modules or complete applications in Vue.js and Nuxt. I work 4 days per week, remotely, on building — not pure maintenance.

  ### Frontend architecture
  I help evaluate an existing architecture, identify points of fragility and define a realistic modernization trajectory. The goal is not a perfect rewrite, but an architecture that is understandable, maintainable, and aligned with the team's capabilities.

  ### Consulting & decision support
  I intervene when several technical options are possible but no clear decision emerges. I help structure criteria, clarify trade-offs and document decisions so they are understood and owned over time.

  ### Pragmatic AI
  I accompany teams when AI enters the discussion. My role: identify relevant use cases, frame risks and integrate progressively without weakening the existing architecture.

  ## When to Call Me

  - You're building a Vue.js or Nuxt application and need a senior dev who thinks long term
  - Your frontend architecture is becoming difficult to evolve
  - Modernization is being considered without a clear trajectory
  - Technical choices need to be arbitrated quickly
  - AI is entering the roadmap without clear framing

  ## What I Don't Do

  - Pure bugfix or maintenance without associated construction
  - Migration without a clear architectural vision
  - Project management or operational delivery
  - Turnkey AI integration without prior reflection

  ## What You Get

  - A frontend built to last, not just to ship
  - Clarified and documented technical decisions
  - An architecture understandable by the whole team
  - A reduction in uncertainty and decision debt
faq:
  title: Frequently Asked Questions
  description: Answers to the most common questions about my support.
  categories:
    - title: Missions & collaboration
      questions:
        - label: Do you work as a developer or as a consultant?
          content: |
            Both. I build Vue.js and Nuxt applications by joining a team, and I bring an architectural perspective on structuring decisions. It's not one or the other — that's what sets me apart.
        - label: Do you only work on Vue.js and Nuxt?
          content: |
            Yes. It's been my ecosystem since 2011. I'd rather be excellent in one domain than average across several.
        - label: What is your working rhythm?
          content: |
            4 days per week, mainly remote from Belgium. Occasional on-site visits are possible depending on the context.
    - title: AI & modernization
      questions:
        - label: Do you offer turnkey AI solutions?
          content: |
            No. I integrate AI only when it's relevant. My role is to help decide if AI brings real value, where, and how to integrate it without creating unnecessary dependency.
        - label: Do you work with teams that are not AI experts?
          content: |
            Yes. What matters is not the initial level, but the ability to make informed decisions. I adapt my approach to the context and maturity of the team.
